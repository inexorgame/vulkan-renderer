name: Static Analysis
on: push

jobs:
  clang-tidy:
    name: Clang Tidy
    runs-on: ubuntu-latest
    container: ubuntu:rolling
    env:
      DEBIAN_FRONTEND: "noninteractive"
    steps:
      - name: Update environment
        run: |
          # Update package lists
          apt update -qq

          # Install tools
          apt install -y \
            clang-tidy \
            cmake \
            curl \
            git \
            libgl1-mesa-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-sync-dev \
            libxcb-util-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxcb-xkb-dev \
            ninja-build \
            parallel \
            pkg-config \
            python3 \
            python3-pip \
            xkb-data \
            xorg-dev

          pip3 install wheel setuptools

      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure CMake
        env:
          CC: gcc
          CXX: g++
        shell: bash
        run: |
          cd build
          cmake .. -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Run clang-tidy
        run: |
          find example src \
            -name '*.cpp' \
            -print0 |
          parallel -0 \
            clang-tidy -p build --header-filter=inexor/ --quiet {} 2>/dev/null |
          tee output
          if [ -s output ]; then exit 1; fi
